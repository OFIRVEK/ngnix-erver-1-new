services:
  web:
    image: nginx:latest
    container_name: nginx-server
    ports:
      - "7065:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app

  db:
    image: mysql:8
    container_name: mysql-db
    environment:
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"

  app:
    image: python:3.11
    container_name: flask-app
    working_dir: /app
    command: sh -c "pip install flask && python app.py"
    volumes:
      - ./app:/app
    expose:
      - "5000"
    restart: always